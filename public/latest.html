                  className="px-3 py-2 sm:px-4 sm:py-2.5 rounded shadow-sm font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-100 text-xs sm:text-sm transition-colors focus:ring-2 focus:ring-slate-200"
                >
                  <div className="flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg> Replay</div>
                </button>
                <button
                  onClick={() => step > 0 && setStep(step - 1)}
                  disabled={step === 0}
                  className={`px-4 py-2 sm:px-5 sm:py-2.5 rounded shadow-sm font-bold text-xs sm:text-sm min-w-[90px] transition-colors focus:ring-2 ${step === 0 ? 'bg-slate-100 text-slate-400 border border-slate-200 cursor-not-allowed shadow-none' : 'bg-white text-slate-700 border border-slate-300 hover:bg-slate-100 focus:ring-slate-200'}`}
                >
                  <div className="flex items-center justify-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg> Prev</div>
                </button>
                <button
                  onClick={() => step < maxSteps && setStep(step + 1)}
                  disabled={step === maxSteps}
                  className={`px-4 py-2 sm:px-5 sm:py-2.5 rounded shadow-sm font-bold text-white text-xs sm:text-sm min-w-[110px] transition-colors focus:ring-2 ${step === maxSteps ? 'bg-slate-300 cursor-not-allowed text-slate-500 shadow-none' : mode === 'http' ? 'bg-red-600 hover:bg-red-500 focus:ring-red-200' : mode === 'encrypt' ? 'bg-orange-500 hover:bg-orange-400 focus:ring-orange-200' : 'bg-blue-600 hover:bg-blue-500 focus:ring-blue-200'}`}
                >
                  {step === maxSteps ? "End " : <div className="flex items-center justify-center gap-1">Next <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg></div>}
                </button>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
